<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
    <title>Расписание</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #111827;
            --bg2: #161d2e;
            --bg3: #1c2438;
            --surface: #1e2740;
            --border: rgba(99, 130, 190, 0.18);
            --text: #e8edf5;
            --muted: rgba(148, 168, 210, 0.55);
            --accent: #5b8dee;
            --glow: rgba(91, 141, 238, 0.22);
            --r: 12px;
            --rs: 8px;
            --lec: #34d399;
            --prac: #fb923c;
            --sem: #fbbf24;
            --lab: #a78bfa;
            --exam: #f87171;
            --other: #64748b;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            font-size: 15px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden
        }

        #app {
            display: flex;
            flex-direction: column;
            min-height: 100vh
        }


        .hdr {
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 100
        }

        .hdr-title {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -.3px
        }

        .hdr-sub {
            font-size: 11px;
            color: var(--muted);
            margin-top: 1px
        }


        .tabs {
            display: flex;
            gap: 8px;
            padding: 10px 16px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            scrollbar-width: none
        }

        .tabs::-webkit-scrollbar {
            display: none
        }

        .tab {
            flex-shrink: 0;
            padding: 6px 18px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all .18s;
            font-family: inherit
        }

        .tab:hover {
            border-color: var(--accent);
            color: var(--accent)
        }

        .tab.active {
            background: var(--accent);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 2px 16px var(--glow)
        }


        .week-nav {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 120px;
            z-index: 8
        }

        .week-arrow {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--bg3);
            border: 1px solid var(--border);
            cursor: pointer;
            color: var(--text);
            font-size: 16px;
            transition: all .18s;
            font-family: inherit;
            user-select: none
        }

        .week-arrow:hover {
            background: var(--surface);
            border-color: var(--accent);
            color: var(--accent)
        }

        .week-arrow:active {
            transform: scale(.9)
        }

        .week-info {
            flex: 1;
            text-align: center
        }

        .week-range {
            font-size: 14px;
            font-weight: 700;
            color: var(--text)
        }

        .week-type-label {
            font-size: 11px;
            color: var(--accent);
            margin-top: 3px;
            font-weight: 600;
            background: rgba(91, 141, 238, 0.1);
            border: 1px solid rgba(91, 141, 238, 0.25);
            border-radius: 20px;
            padding: 2px 12px;
            display: inline-block;
            letter-spacing: .1px
        }

        .content {
            flex: 1
        }

        .view {
            display: none;
            animation: fs .22s ease
        }

        .view.active {
            display: block
        }

        @keyframes fs {
            from {
                opacity: 0;
                transform: translateY(8px)
            }
            to {
                opacity: 1;
                transform: translateY(0)
            }
        }


        .srch-wrap {
            padding: 10px 16px 6px
        }

        .srch-box {
            display: flex;
            align-items: center;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 0 12px;
            gap: 8px;
            transition: all .18s
        }

        .srch-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--glow)
        }

        .srch-box svg {
            flex-shrink: 0;
            color: var(--muted)
        }

        .srch-inp {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 15px;
            padding: 9px 0;
            outline: none;
            font-family: inherit
        }

        .srch-inp::placeholder {
            color: var(--muted)
        }

        .grp-list {
            padding: 4px 16px 20px
        }

        .grp-lbl {
            font-size: 11px;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: .8px;
            text-transform: uppercase;
            padding: 8px 0 5px
        }

        .grp-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 13px 16px;
            background: var(--surface);
            border-radius: var(--r);
            margin-bottom: 6px;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all .18s
        }

        .grp-item:hover {
            border-color: var(--accent);
            background: var(--bg3);
            transform: translateY(-1px)
        }

        .grp-item:active {
            transform: scale(.985)
        }

        .grp-name {
            font-size: 15px;
            font-weight: 500
        }

        .grp-chev {
            color: var(--muted)
        }

        .empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
            font-size: 14px
        }


        .sch-hdr {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 68px;
            z-index: 9
        }

        .back {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--bg3);
            border: 1px solid var(--border);
            cursor: pointer;
            color: var(--text);
            flex-shrink: 0;
            transition: all .18s;
            font-family: inherit
        }

        .back:hover {
            border-color: var(--accent);
            color: var(--accent)
        }

        .sch-grp {
            font-size: 16px;
            font-weight: 600
        }

        .sch-sub {
            font-size: 11px;
            color: var(--muted);
            margin-top: 1px
        }


        .day-nav {
            display: flex;
            gap: 6px;
            padding: 8px 16px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 176px;
            z-index: 7
        }

        .day-chip {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 7px 4px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: all .18s;
            font-family: inherit;
            gap: 2px;
            min-width: 0
        }

        .day-chip.active {
            background: var(--accent);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 2px 12px var(--glow)
        }

        .day-chip.has-lessons {
            color: var(--text)
        }

        .day-chip.today .chip-name {
            color: var(--accent)
        }

        .chip-name {
            font-size: 13px;
            font-weight: 600
        }

        .chip-date {
            font-size: 10px;
            opacity: .7
        }


        .sch-body {
            padding: 12px 16px 24px
        }

        .day-block {
            margin-bottom: 20px;
            display: none
        }

        .day-block.visible {
            display: block
        }

        .day-lbl {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .9px;
            color: var(--muted);
            margin-bottom: 8px;
            padding: 0 2px
        }


        .card {
            background: var(--surface);
            border-radius: var(--r);
            padding: 14px 16px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            transition: border-color .18s
        }

        .card:active {
            transform: scale(.985)
        }

        .card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            border-radius: 3px 0 0 3px
        }

        .card.lec::before {
            background: var(--lec)
        }

        .card.practice::before {
            background: var(--prac)
        }

        .card.seminar::before {
            background: var(--sem)
        }

        .card.lab::before {
            background: var(--lab)
        }

        .card.exam::before {
            background: var(--exam)
        }

        .card.other::before {
            background: var(--other)
        }

        .card-time-row {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-bottom: 5px;
            flex-wrap: wrap;
            justify-content: flex-start
        }

        .card-time {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            font-variant-numeric: tabular-nums
        }

        .card-time-end {
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            white-space: nowrap;
            font-variant-numeric: tabular-nums
        }

        .badge {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            letter-spacing: .4px;
            text-transform: uppercase;
            flex-shrink: 0
        }

        .b-lec {
            background: rgba(52, 211, 153, .12);
            color: var(--lec)
        }

        .b-prac {
            background: rgba(251, 146, 60, .12);
            color: var(--prac)
        }

        .b-sem {
            background: rgba(251, 191, 36, .12);
            color: var(--sem)
        }

        .b-lab {
            background: rgba(167, 139, 250, .12);
            color: var(--lab)
        }

        .b-exam {
            background: rgba(248, 113, 113, .12);
            color: var(--exam)
        }

        .b-other {
            background: rgba(100, 116, 139, .12);
            color: var(--other)
        }

        .card-subj {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.35;
            color: var(--text)
        }

        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 6px
        }

        .meta {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: var(--muted)
        }

        .free-day {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 14px;
            background: var(--bg3);
            border-radius: var(--rs);
            color: var(--muted);
            font-size: 13px;
            border: 1px dashed var(--border)
        }


        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            gap: 14px;
            color: var(--muted);
            font-size: 14px
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 2.5px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .err {
            margin: 20px 16px;
            padding: 16px;
            background: rgba(255, 107, 107, .1);
            border: 1px solid rgba(255, 107, 107, .3);
            border-radius: var(--r);
            color: #ff8888;
            font-size: 13px;
            text-align: center
        }

        .retry {
            margin-top: 10px;
            padding: 7px 16px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--rs);
            font-size: 13px;
            cursor: pointer;
            font-family: inherit
        }

    </style>
</head>
<body>
<div id="app">
    <div class="hdr">
        <div class="hdr-title">📅 Расписание занятий обучающихся</div>
        <div class="hdr-sub">Экономический факультет</div>
    </div>

    <div class="tabs" id="course-tabs">
        <button class="tab active" data-course="1">1 курс</button>
        <button class="tab" data-course="2">2 курс</button>
        <button class="tab" data-course="3">3 курс</button>
        <button class="tab" data-course="4">4 курс</button>
    </div>

    <div class="content">
        <!-- Groups -->
        <div id="view-groups" class="view active">
            <div class="srch-wrap">
                <div class="srch-box">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                    <input type="text" id="grp-search" class="srch-inp" placeholder="Поиск группы…" autocomplete="off"/>
                </div>
            </div>
            <div class="grp-list" id="grp-list">
                <div class="loader">
                    <div class="spinner"></div>
                    <span>Загружаем группы…</span></div>
            </div>
        </div>

        <!-- Schedule -->
        <div id="view-schedule" class="view">
            <div class="sch-hdr">
                <button class="back" id="back-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2.2">
                        <path d="m15 18-6-6 6-6"/>
                    </svg>
                </button>
                <div>
                    <div class="sch-grp" id="sch-grp-name">—</div>

                </div>
            </div>
            <div class="week-nav" id="week-nav">
                <button class="week-arrow" id="week-prev">&#8249;</button>
                <div class="week-info">
                    <div class="week-range" id="week-range">—</div>
                    <div class="week-type-label" id="week-type-label">—</div>
                </div>
                <button class="week-arrow" id="week-next">&#8250;</button>
            </div>
            <div class="day-nav" id="day-nav"></div>
            <div class="sch-body" id="sch-body">
                <div class="loader">
                    <div class="spinner"></div>
                    <span>Загружаем расписание…</span></div>
            </div>
        </div>
    </div>
</div>

<script>
    const API = window.location.origin + '/api/v1';
    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.ready();
        tg.expand();
    }

    const ANCHOR_MON_MS = Date.UTC(2026, 2, 23);
    const ANCHOR_IS_EVEN = true;

    function getMondayUTC(d) {
        const day = d.getUTCDay();
        const diff = day === 0 ? -6 : 1 - day;
        return Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate() + diff);
    }

    function calcWeekType(d) {
        const monMs = getMondayUTC(d);
        const diffW = Math.round((monMs - ANCHOR_MON_MS) / (7 * 864e5));
        const isEven = ANCHOR_IS_EVEN ? diffW % 2 === 0 : diffW % 2 !== 0;
        return isEven ? 'even' : 'odd';
    }

    const state = {
        course: 1,
        groups: [],
        schedule: null,
        activeDay: null,
        weekType: calcWeekType(new Date()),
        weekOffset: 0,
        groupsCache: {},
        scheduleCache: {},
    };

    const $ = id => document.getElementById(id);
    const vG = $('view-groups'), vS = $('view-schedule');
    const gList = $('grp-list'), gSearch = $('grp-search');
    const dayNav = $('day-nav'), schBody = $('sch-body');

    async function syncWeek() {
        try {
            const w = await apiGet('/week');
            state.weekType = w.week_type;
        } catch (e) {
        }
    }

    const TYPE_LABEL = {
        lecture: 'Лекция',
        practice: 'Практика',
        seminar: 'Семинар',
        lab: 'Лаб.',
        exam: 'Экзамен',
        other: 'Другое'
    };
    const TYPE_CSS = {
        lecture: 'lec',
        practice: 'practice',
        seminar: 'seminar',
        lab: 'lab',
        exam: 'exam',
        other: 'other'
    };
    const BADGE_CSS = {
        lec: 'b-lec',
        practice: 'b-prac',
        seminar: 'b-sem',
        lab: 'b-lab',
        exam: 'b-exam',
        other: 'b-other'
    };
    const DAYS_RU = ['Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница'];
    const DAYS_SHORT = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт'];

    function getMondayOfWeek(wt) {

        const today = new Date();
        const monMs = getMondayUTC(today);
        return new Date(monMs);
    }

    function getDatesForWeek() {

        const mon = getMondayOfWeek();
        return Array.from({length: 5}, (_, i) => {
            const d = new Date(mon);
            d.setUTCDate(d.getUTCDate() + i);
            return d;
        });
    }

    function fmtDate(d) {
        return d.getUTCDate() + '.' + String(d.getUTCMonth() + 1).padStart(2, '0');
    }

    function isToday(d) {
        const t = new Date();
        return d.getUTCFullYear() === t.getUTCFullYear() &&
            d.getUTCMonth() === t.getUTCMonth() &&
            d.getUTCDate() === t.getUTCDate();
    }

    async function apiGet(path) {
        const r = await fetch(API + path);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
    }

    async function loadGroups(course) {
        if (state.groupsCache[course]) {
            state.groups = state.groupsCache[course];
            renderGroups('');
            return;
        }
        gList.innerHTML = `<div class="loader"><div class="spinner"></div><span>Загружаем…</span></div>`;
        try {
            const d = await apiGet('/courses/' + course + '/groups');
            state.groups = d.groups || [];
            state.groupsCache[course] = state.groups;
            renderGroups('');
        } catch (e) {
            gList.innerHTML = `<div class="err">Ошибка загрузки<br><small>${e.message}</small><br><button class="retry" onclick="loadGroups(${course})">Повторить</button></div>`;
        }
    }

    function renderGroups(filter) {
        const f = filter.trim().toLowerCase();
        const arr = f ? state.groups.filter(g => g.toLowerCase().includes(f)) : state.groups;
        if (!arr.length) {
            gList.innerHTML = `<div class="empty">${f ? 'Группа не найдена' : 'Нет групп'}</div>`;
            return;
        }
        gList.innerHTML = `<div class="grp-lbl">${arr.length} групп</div>`
            + arr.map(g => `<div class="grp-item" data-g="${esc(g)}">
        <span class="grp-name">${esc(g)}</span>
        <svg class="grp-chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m9 18 6-6-6-6"/></svg>
      </div>`).join('');
        gList.querySelectorAll('.grp-item').forEach(el =>
            el.addEventListener('click', () => selectGroup(el.dataset.g)));
    }

    function resetWeekOffset() {
        const dow = new Date().getDay();
        state.weekOffset = (dow === 0 || dow === 6) ? 1 : 0;
    }

    async function selectGroup(group) {
        resetWeekOffset();
        state.activeDay = null;
        state.schedule = null;
        showView('schedule');
        $('sch-grp-name').textContent = 'Группа ' + group;
        updateWeekNav();
        dayNav.innerHTML = '';
        schBody.innerHTML = `<div class="loader"><div class="spinner"></div><span>Загружаем…</span></div>`;

        const key = state.course + ':' + group;
        if (state.scheduleCache[key]) {
            state.schedule = state.scheduleCache[key];
            renderSchedule(state.schedule);
            return;
        }

        try {
            const data = await apiGet('/courses/' + state.course + '/groups/' + encodeURIComponent(group) + '/schedule');
            state.scheduleCache[key] = data;
            state.schedule = data;
            renderSchedule(data);
        } catch (e) {
            schBody.innerHTML = `<div class="err">Ошибка загрузки<br><small>${e.message}</small><br><button class="retry" onclick="selectGroup('${esc(group)}')">Повторить</button></div>`;
        }
    }

    function getDatesForViewedWeek() {
        const today = new Date();
        today.setDate(today.getDate() + state.weekOffset * 7);
        const monMs = getMondayUTC(today);
        return Array.from({length: 5}, (_, i) => {
            const d = new Date(monMs);
            d.setUTCDate(d.getUTCDate() + i);
            return d;
        });
    }

    function updateWeekNav() {
        const dates = getDatesForViewedWeek();
        const mon = dates[0], fri = dates[4];
        const MONTHS = ['янв', 'фев', 'мар', 'апр', 'мая', 'июн', 'июл', 'авг', 'сен', 'окт', 'ноя', 'дек'];
        const monStr = mon.getUTCDate() + ' ' + MONTHS[mon.getUTCMonth()];
        const friStr = fri.getUTCDate() + ' ' + MONTHS[fri.getUTCMonth()];
        const d = new Date();
        d.setDate(d.getDate() + state.weekOffset * 7);
        state.weekType = calcWeekType(d);
        const even = state.weekType === 'even';
        $('week-range').textContent = monStr + ' — ' + friStr;
        $('week-type-label').textContent = even ? 'Нижняя · чётная' : 'Верхняя · нечётная';
    }

    function renderSchedule(data) {
        const days = data.days || [];
        const dates = getDatesForViewedWeek();
        const wt = state.weekType;


        dayNav.innerHTML = days.map((d, i) => {
            const dateObj = dates[DAYS_RU.indexOf(d.day)] || dates[i] || null;
            const dateStr = dateObj ? fmtDate(dateObj) : '';
            const today = dateObj && state.weekOffset === 0 ? isToday(dateObj) : false;

            const visible = (d.lessons || []).filter(l => !l.week_type || l.week_type === wt);
            return `<button class="day-chip ${visible.length ? 'has-lessons' : ''} ${today ? 'today' : ''}" data-day="${esc(d.day)}">
      <span class="chip-name">${DAYS_SHORT[DAYS_RU.indexOf(d.day)] || d.day.slice(0, 2)}</span>
      ${dateStr ? `<span class="chip-date">${dateStr}</span>` : ''}
    </button>`;
        }).join('');


        let autoDay = days[0] ? days[0].day : null;
        if (state.weekOffset === 0) {
            const today = new Date();
            const idx = today.getUTCDay();
            const todayRU = idx >= 1 && idx <= 5 ? DAYS_RU[idx - 1] : null;
            const found = todayRU && days.find(d => d.day === todayRU);
            if (found) autoDay = todayRU;
        }
        state.activeDay = autoDay;

        dayNav.querySelectorAll('.day-chip').forEach(btn => {
            if (btn.dataset.day === state.activeDay) btn.classList.add('active');
            btn.addEventListener('click', () => {
                dayNav.querySelectorAll('.day-chip').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.activeDay = btn.dataset.day;
                showDays();
            });
        });


        schBody.innerHTML = days.map(d =>
            `<div class="day-block" data-day="${esc(d.day)}">
      <div class="day-lbl">${esc(d.day)}</div>
      ${renderLessons(d.lessons)}
    </div>`).join('');

        showDays();
    }

    function showDays() {
        schBody.querySelectorAll('.day-block').forEach(b =>
            b.classList.toggle('visible', b.dataset.day === state.activeDay));
    }

    function renderLessons(lessons) {
        const wt = state.weekType;

        const filtered = (lessons || []).filter(l => !l.week_type || l.week_type === wt);

        if (!filtered.length) return `<div class="free-day">✓ Занятий нет</div>`;

        return filtered.map(l => {
            const css = TYPE_CSS[l.lesson_type] || 'other';
            const lbl = TYPE_LABEL[l.lesson_type] || l.lesson_type;
            const bcss = BADGE_CSS[css] || 'b-other';

            const teacher = l.teacher ? `<span class="meta">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      ${esc(l.teacher)}</span>` : '';
            const room = l.room ? `<span class="meta">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      ауд. ${esc(l.room)}</span>` : '';

            return `<div class="card ${css}">
      <div class="card-time-row">
        <span class="card-time">🕐 ${esc(l.time_start)} — ${esc(l.time_end)}</span>
        <span class="badge ${bcss}">${esc(lbl)}</span>
      </div>
      <div class="card-subj">${esc(l.subject)}</div>
      ${teacher || room ? `<div class="card-meta">${teacher}${room}</div>` : ''}
    </div>`;
        }).join('');
    }

    function showView(name) {
        vG.classList.toggle('active', name === 'groups');
        vS.classList.toggle('active', name === 'schedule');
        $('course-tabs').style.display = name === 'groups' ? 'flex' : 'none';
    }

    $('course-tabs').addEventListener('click', e => {
        const tab = e.target.closest('.tab');
        if (!tab) return;
        const c = parseInt(tab.dataset.course);
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        state.course = c;
        gSearch.value = '';
        showView('groups');
        loadGroups(c);
    });

    $('back-btn').addEventListener('click', () => {
        resetWeekOffset();
        showView('groups');
        state.schedule = null;
    });

    let st;
    gSearch.addEventListener('input', e => {
        clearTimeout(st);
        st = setTimeout(() => renderGroups(e.target.value), 120);
    });

    function esc(s) {
        return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    $('week-prev').addEventListener('click', () => {
        state.weekOffset--;
        updateWeekNav();
        if (state.schedule) renderSchedule(state.schedule);
    });
    $('week-next').addEventListener('click', () => {
        state.weekOffset++;
        updateWeekNav();
        if (state.schedule) renderSchedule(state.schedule);
    });
    syncWeek();
    loadGroups(1);
</script>
</body>
</html>
